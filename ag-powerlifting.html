const nextW = (w,a,t) => { if(!a||!t||!w) return null; const d=a-t; if(d>=1.5) return Math.round((w-7.5)/5)*5; if(d>=0.5) return w; return Math.round((w+5)/5)*5; };

// Plate calculator
const BAR_KG=20, LBS_TO_KG=0.453592;
const PLATES_KG=[25,20,15,10,5,2.5,1.25];
const PLATE_COLORS_MAP={25:"#ef4444",20:"#3b82f6",15:"#facc15",10:"#4ade80",5:"#e5e5e5",2.5:"#fb923c",1.25:"#a78bfa"};
function calcPlates(lbs) {
  if(!lbs) return null;
  const perSide=(parseFloat(lbs)*LBS_TO_KG-BAR_KG)/2;
  if(perSide<=0) return [];
  let rem=Math.round(perSide*1000)/1000, result=[];
  for(const p of PLATES_KG){ const c=Math.floor(rem/p+0.0001); if(c>0){result.push({kg:p,count:c});rem=Math.round((rem-c*p)*1000)/1000;} }
  return result;
}
function PlateDisplay({weightLbs}) {
  const lbs=parseFloat(weightLbs);
  if(!lbs) return null;
  const plates=calcPlates(lbs);
  if(!plates) return null;
  const totalKg=(lbs*LBS_TO_KG).toFixed(2);
  const platesKg=((lbs*LBS_TO_KG)-BAR_KG).toFixed(2);
  return (
    <div style={{marginTop:10,padding:"10px 12px",background:"#282828",borderRadius:8,border:"1px solid #3a3a3a"}}>
      <div style={{fontSize:9,color:"#666",letterSpacing:1,marginBottom:8}}>BAR LOADED · {totalKg}kg total · 20kg bar + {platesKg}kg plates</div>
      {plates.length===0 ? <div style={{fontSize:10,color:"#888"}}>Bar only (20kg)</div> : (
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"flex-end",gap:2}}>
            <div style={{width:8,height:10,background:"#888",borderRadius:"2px 0 0 2px"}}/>
            {plates.map((p,i)=>Array.from({length:p.count},(_,j)=>(
              <div key={i+"-"+j} title={p.kg+"kg"} style={{
                width:p.kg>=20?13:p.kg>=10?10:p.kg>=5?8:6,
                height:p.kg>=20?38:p.kg>=10?30:p.kg>=5?22:16,
                background:PLATE_COLORS_MAP[p.kg],borderRadius:2,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:6,color:p.kg>=10?"#fff":"#111",fontWeight:"bold",

              }}>{p.kg>=10?p.kg:""}</div>
            )))}
            <div style={{width:8,height:10,background:"#888",borderRadius:"0 2px 2px 0"}}/>
          </div>
          <div style={{fontSize:10,color:"#888",marginLeft:4}}>each side</div>
          <div style={{marginLeft:"auto",fontSize:10,color:"#aaa"}}>{plates.map(p=>p.count+"x"+p.kg+"kg").join(" + ")}</div>
        </div>
      )}
    </div>
  );
}

function hardestRPE(sets,ei,n){ let max=null; for(let si=0;si<n;si++){const v=parseFloat((sets[ei+"-"+si]||{}).rpe);if(!isNaN(v)&&(max===null||v>max))max=v;} return max; }
function weekFatigue(week,logs){ let s=0,n=0; week.days.forEach(d=>{Object.values((logs[d.id]||{}).sets||{}).forEach(x=>{const r=parseFloat(x.rpe);if(!isNaN(r)){s+=r;n++;}});}); if(!n)return null; return Math.round(((s/n-5)/5)*100)/10; }

// ── API call (proxied through Netlify function or direct with key) ─────────────
async function callClaude(apiKey, body) {
  const res = await fetch("/.netlify/functions/claude", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey},
    body:JSON.stringify(body)
  });
  // fallback: if netlify function not found, call direct (dev mode)
  if(res.status===404){
    const res2=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify(body)
    });
    return res2.json();
  }
  return res.json();
}

  function subCatFor(ex){if(ex.lift)return ex.lift;const n=ex.name.toLowerCase();if(["leg","squat","rdl","curl","extension","hip","calf","nordic"].some(k=>n.includes(k)))return"lower";if(["tricep","bicep","pushdown","hammer"].some(k=>n.includes(k)))return"arms";if(["raise","row","press","fly","pull","face","band"].some(k=>n.includes(k)))return"upper";return"core";}

  async function generate(){

                        {/* Exercises */}
                        {day.exercises.map((ex,ei)=>{

                          const synthCol=ex.targetRPE&&hard?rpeCol(hard,ex.targetRPE):C.dim;

                                {ex.lift&&<div style={{width:2,height:14,background:lc,borderRadius:1,flexShrink:0}}/>}
                                {isEd?(
                                  <div style={{display:"flex",flexWrap:"wrap",gap:6,flex:1,alignItems:"center"}}>
                                    <input className="ei" value={ed.name||""} placeholder="Name" style={{width:165}} onChange={e=>setExEdits(p=>({...p,[ek]:{...p[ek],name:e.target.value}}))}/>
                                    <input className="ei" value={ed.sets||""} placeholder="Sets" type="number" style={{width:48,textAlign:"center"}} onChange={e=>setExEdits(p=>({...p,[ek]:{...p[ek],sets:e.target.value}}))}/>
                                    <input className="ei" value={ed.reps||""} placeholder="Reps" style={{width:68,textAlign:"center"}} onChange={e=>setExEdits(p=>({...p,[ek]:{...p[ek],reps:e.target.value}}))}/>
                                    {ex.weight!=null&&<input className="ei" value={ed.weight||""} placeholder="lb" type="number" style={{width:60,textAlign:"center"}} onChange={e=>setExEdits(p=>({...p,[ek]:{...p[ek],weight:e.target.value}}))}/>}
                                    {ex.targetRPE!=null&&<input className="ei" value={ed.rpe||""} placeholder="RPE" type="number" step="0.5" style={{width:55,textAlign:"center"}} onChange={e=>setExEdits(p=>({...p,[ek]:{...p[ek],rpe:e.target.value}}))}/>}
                                    <button className="btn" onClick={()=>saveEdit(day.id,ei)} style={{padding:"4px 10px",borderRadius:5,border:"1px solid #4ade8055",background:"transparent",color:"#4ade80",fontSize:11}}>✓</button>
                                    <button className="btn" onClick={()=>setEditEx(null)} style={{padding:"4px 10px",borderRadius:5,border:"1px solid "+C.border,background:"transparent",color:C.faint,fontSize:11}}>✕</button>
                                  </div>
                                ):(
                                  <>
                                    <span style={{fontSize:12,color:ex.lift?C.text:C.muted,fontWeight:ex.lift?"500":"400"}}>{ex.name}</span>
                                    <span style={{fontSize:10,color:C.faint}}>{ex.sets}×{ex.reps}</span>
                                    {ex.targetRPE&&<span style={{fontSize:10,color:C.dim}}>@ RPE {ex.targetRPE}</span>}
                                    {hard&&ex.targetRPE&&(
                                      <span style={{fontSize:10,color:synthCol,padding:"1px 8px",border:"1px solid "+synthCol+"44",borderRadius:10}}>
                                        hardest {hard} → {nw!==null?(nw>ex.weight?"▲ +"+(nw-ex.weight)+"lb":nw<ex.weight?"▼ "+(nw-ex.weight)+"lb":"◆ hold"):"◆ hold"}
                                      </span>
                                    )}
                                    <div style={{marginLeft:"auto",display:"flex",gap:4,position:"relative"}}>
                                      <button className="btn" onClick={e=>{e.stopPropagation();setSubMenu(subMenu===ek?null:ek);}}
                                        style={{padding:"2px 8px",borderRadius:4,border:"1px solid "+C.border,background:"transparent",color:C.dim,fontSize:10}}>⇄</button>
                                      <button className="btn" onClick={()=>startEdit(day.id,ei,ex)}
                                        style={{padding:"2px 8px",borderRadius:4,border:"1px solid "+C.border,background:"transparent",color:C.dim,fontSize:10}}>✎</button>
                                      {subMenu===ek&&(
                                        <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:26,right:0,background:"#282828",border:"1px solid "+C.borderHi,borderRadius:8,zIndex:100,minWidth:210,boxShadow:"0 8px 28px rgba(0,0,0,.5)",overflow:"hidden"}}>
                                          <div style={{padding:"8px 12px",fontSize:9,color:C.dim,letterSpacing:1,borderBottom:"1px solid "+C.border}}>SWAP WITH</div>
                                          <div style={{maxHeight:220,overflowY:"auto"}}>
                                            {subs.map(s=>(
                                              <button key={s} className="btn" onClick={()=>subEx(day.id,ei,s)}
                                                style={{display:"block",width:"100%",padding:"9px 12px",textAlign:"left",background:"transparent",border:"none",borderBottom:"1px solid "+C.border,color:C.muted,fontSize:11}}>{s}</button>
                                            ))}
                                          </div>
                                        </div>
                                      )}
                                    </div>
                                  </>
                                )}
                              </div>
                              {/* Set cards */}
                              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                                {Array.from({length:ex.sets},(_,si)=>{
                                  const s=getSet(day.id,ei,si);
                                  const rn=parseFloat(s.rpe);
                                  const sc=ex.lift&&ex.targetRPE&&!isNaN(rn)?rpeCol(rn,ex.targetRPE):C.border;
                                  return (
                                    <div key={si} style={{background:C.bg,border:"1px solid "+sc+"66",borderRadius:8,padding:"9px 10px",display:"flex",flexDirection:"column",gap:5,minWidth:84}}>
                                      <div style={{fontSize:9,color:C.dim,letterSpacing:1}}>SET {si+1}</div>
                                      <input className="si" type="number" placeholder={ex.weight?ex.weight:"lb"} value={s.weight||""}
                                        onChange={e=>updSet(day.id,ei,si,"weight",e.target.value)}
                                        style={{borderColor:s.weight?C.borderHi:C.border,color:s.weight?C.text:C.faint}}/>
                                      {ex.lift&&(
                                        <input className="si" type="number" placeholder="RPE" min="5" max="10" step="0.5" value={s.rpe||""}
                                          onChange={e=>updSet(day.id,ei,si,"rpe",e.target.value)}
                                          style={{borderColor:sc,color:!isNaN(rn)?sc:C.faint}}/>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                              {ex.lift&&(()=>{const fw=getSet(day.id,ei,0).weight||ex.weight;return fw?<PlateDisplay weightLbs={fw}/>:null;})()}
                            </div>
                          );
                        })}
                        {/* Note + Done */}
                        <div style={{display:"flex",gap:10,alignItems:"flex-end",marginTop:6}}>
                          <textarea placeholder="Session note..." value={l.note} rows={2} onChange={e=>updLog(day.id,{note:e.target.value})}
                            style={{flex:1,background:C.bg,border:"1px solid "+C.border,borderRadius:8,color:C.text,fontSize:11,padding:"9px 12px",resize:"none"}}/>
                          <button className="btn" onClick={()=>{updLog(day.id,{completed:true});setOpenDay(null);}}
                            style={{padding:"9px 18px",borderRadius:8,border:"1px solid #4ade8055",background:"#1a2a1f",color:"#4ade80",fontSize:11,letterSpacing:1,whiteSpace:"nowrap"}}>
                            ✓ DONE
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* CHAT */}
          {view==="chat"&&(
            <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 172px)",background:C.card,border:"1px solid "+C.border,borderRadius:10,overflow:"hidden"}}>
              <div style={{padding:"11px 18px",borderBottom:"1px solid "+C.border,display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:"#4ade80",boxShadow:"0 0 8px #4ade80"}}/>
                <span style={{fontSize:10,color:C.faint,letterSpacing:1}}>AI COACH · {week.label.toUpperCase()}{fatigue!==null?" · fatigue "+fatigue+"/10":""}</span>
              </div>
              <div style={{flex:1,overflowY:"auto",padding:18,display:"flex",flexDirection:"column",gap:12}}>
                {chat.map((m,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                    <div style={{maxWidth:"78%",padding:"10px 14px",borderRadius:10,fontSize:12,lineHeight:1.7,
                      background:m.role==="user"?C.hover:C.bg,border:"1px solid "+(m.role==="user"?C.borderHi:C.border),
                      color:m.role==="user"?"#c4b5fd":C.muted,whiteSpace:"pre-wrap"}}>{m.content}</div>
                  </div>
                ))}
                {chatLoad&&<div style={{display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:"#4ade80",animation:"pulse 1.2s ease "+(i*.2)+"s infinite"}}/>)}</div>}
                <div ref={chatRef}/>
              </div>
              <div style={{padding:"11px 18px",borderTop:"1px solid "+C.border,display:"flex",gap:8}}>
                <textarea value={chatIn} onChange={e=>setChatIn(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}}}
                  placeholder="Ask about adjustments, fatigue, anything..." rows={2}
                  style={{flex:1,background:C.bg,border:"1px solid "+C.border,borderRadius:8,color:C.text,fontSize:12,padding:"9px 13px",resize:"none"}}/>
                <button className="btn" onClick={sendChat} disabled={chatLoad}
                  style={{padding:"0 16px",background:C.bg,border:"1px solid "+C.borderHi,borderRadius:8,color:chatLoad?C.dim:"#a78bfa",fontSize:18}}>↑</button>
              </div>
            </div>
          )}

          {/* HISTORY */}
          {view==="history"&&(
            <div>
              <div style={{fontSize:10,color:C.dim,letterSpacing:2,marginBottom:16}}>LOAD PROGRESSION — ALL WEEKS</div>
              {["squat","bench","deadlift"].map(lift=>{
                const lc=LIFT_COLORS[lift],pts=progressionData(lift);
                if(!pts.length) return <div key={lift} style={{marginBottom:12,padding:"14px 18px",background:C.card,borderRadius:10,border:"1px solid "+C.border}}><div style={{fontSize:11,color:lc,letterSpacing:1}}>{lift.toUpperCase()}</div><div style={{fontSize:11,color:C.dim,marginTop:6}}>No data</div></div>;
                const maxW=Math.max(...pts.map(p=>p.weight)),minW=Math.min(...pts.map(p=>p.weight));
                const trend=pts[pts.length-1].weight-pts[0].weight;
                return (
                  <div key={lift} style={{marginBottom:12,padding:"16px 18px",background:C.card,borderRadius:10,border:"1px solid "+C.border}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:14}}>
                      <span style={{fontSize:11,color:lc,letterSpacing:1}}>{lift.toUpperCase()}</span>
                      <div style={{display:"flex",gap:16}}>
                        <span style={{fontSize:10,color:C.faint}}>Peak <span style={{color:lc}}>{maxW}lb</span></span>
                        <span style={{fontSize:10,color:C.faint}}>Trend <span style={{color:trend>=0?"#4ade80":"#ef4444"}}>{trend>=0?"+":""}{trend}lb</span></span>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:72}}>
                      {pts.map((p,i)=>{const h=maxW===minW?50:Math.max(6,((p.weight-minW)/(maxW-minW))*66);return(
                        <div key={i} title={p.name+" W"+p.week+": "+p.weight+"lb"+(p.logged?" (logged)":" (programmed)")} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                          <div style={{fontSize:8,color:C.dim}}>{p.weight}</div>
                          <div style={{width:"100%",height:h,background:p.logged?lc:lc+"33",borderRadius:"3px 3px 0 0",border:"1px solid "+(p.logged?lc:lc+"55")}}/>
                          <div style={{fontSize:8,color:C.dim}}>W{p.week}</div>
                        </div>
                      );})}
                    </div>
                    <div style={{marginTop:8,fontSize:9,color:C.dim,display:"flex",gap:12}}>
                      <span><span style={{color:lc}}>█</span> logged</span>
                      <span><span style={{color:lc+"44"}}>█</span> programmed</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Preview modal */}
      {preview&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.72)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={()=>setPreview(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#282828",border:"1px solid "+C.borderHi,borderRadius:12,padding:24,maxWidth:580,width:"90%",maxHeight:"82vh",overflowY:"auto"}}>
            <div style={{fontFamily:"'Barlow Condensed'",fontWeight:800,fontSize:22,letterSpacing:2,marginBottom:3}}>WEEK {preview.id} PREVIEW</div>
            <div style={{fontSize:10,color:pCol(preview.phase),letterSpacing:2,marginBottom:16}}>{preview.phase?.toUpperCase()}</div>
            {preview.reasoning&&<div style={{padding:"12px 14px",background:C.bg,borderRadius:8,border:"1px solid "+C.border,fontSize:12,color:C.muted,lineHeight:1.65,marginBottom:16}}>💡 {preview.reasoning}</div>}
            {preview.days?.filter(d=>d.type!=="rest").map((d,i)=>(
              <div key={i} style={{marginBottom:10,padding:"12px 14px",background:C.bg,borderRadius:8,border:"1px solid "+C.border}}>
                <div style={{fontSize:11,color:C.text,marginBottom:8}}>{d.label} — {d.focus}</div>
                {d.exercises?.filter(e=>e.lift).map((ex,ei)=>(
                  <div key={ei} style={{fontSize:11,color:C.muted,display:"flex",gap:8,marginBottom:5,alignItems:"center"}}>
                    <div style={{width:3,height:14,background:LIFT_COLORS[ex.lift]||"#555",borderRadius:1,flexShrink:0}}/>
                    <span style={{color:C.text}}>{ex.name}</span>
                    <span>{ex.sets}×{ex.reps}</span>
                    {ex.weight&&<span style={{color:LIFT_COLORS[ex.lift]||C.text,fontWeight:"500"}}>{ex.weight}lb</span>}
                    {ex.targetRPE&&<span style={{color:C.faint}}>@ RPE {ex.targetRPE}</span>}
                  </div>
                ))}
                {d.exercises?.filter(e=>!e.lift).length>0&&<div style={{fontSize:10,color:C.dim,marginTop:5}}>+ {d.exercises.filter(e=>!e.lift).map(e=>e.name).join(", ")}</div>}
              </div>
            ))}
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button className="btn" onClick={commit} style={{flex:1,padding:"11px 0",borderRadius:8,border:"1px solid #4ade8055",background:"#1a2a1f",color:"#4ade80",fontSize:12,letterSpacing:1}}>✓ COMMIT WEEK {preview.id}</button>
              <button className="btn" onClick={()=>setPreview(null)} style={{padding:"11px 18px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.faint,fontSize:12}}>Discard</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
